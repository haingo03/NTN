<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Ảnh Kỷ Niệm ❤️</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #fff5f7; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
        }
        h1 { color: #ff4d6d; margin-bottom: 30px; }
        
        /* Layout lưới tự động sắp xếp ảnh */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        .gallery-item {
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-10px); /* Hiệu ứng bay lên khi di chuột */
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover; /* Ảnh không bị méo, tự cắt đẹp */
            border-radius: 10px;
        }

        .back-home {
            display: inline-block;
            margin-bottom: 30px;
            text-decoration: none;
            color: #ff4d6d;
            font-weight: bold;
            border: 2px solid #ff4d6d;
            padding: 8px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-home:hover {
            background: #ff4d6d;
            color: white;
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-home">← Quay lại trang chủ</a>
    <h1>Kho ảnh của Thảo Nhi & [Tên ông] ❤️</h1>

    <div class="gallery">
        <div class="gallery-item"><img src="../Images/anh1.jpg" alt="Kỷ niệm"></div>
        <div class="gallery-item"><img src="../Images/anh2.jpg" alt="Kỷ niệm"></div>
        <div class="gallery-item"><img src="../Images/anh3.jpg" alt="Kỷ niệm"></div>
        <div class="gallery-item"><img src="../Images/anh4.jpg" alt="Kỷ niệm"></div>
        </div>

</body>
</html>
