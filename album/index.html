<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Ảnh Kỷ Niệm ❤️</title>
    <style>
        /* GIỮ NGUYÊN PHẦN CSS CŨ CỦA ÔNG VÌ NÓ ĐÃ ĐẸP RỒI */
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f7; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #ff4d6d; margin-bottom: 30px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery-item {
            background: #fff; padding: 10px; border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .gallery-item:hover { transform: translateY(-10px); }
        .gallery-item img { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; }
        .back-home {
            display: inline-block; margin-bottom: 30px; text-decoration: none;
            color: #ff4d6d; font-weight: bold; border: 2px solid #ff4d6d;
            padding: 8px 20px; border-radius: 50px;
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-home">← Quay lại trang chủ</a>
    <h1>Kho ảnh của Thảo Nhi ❤️</h1>

    <div class="gallery" id="image-gallery"></div>

    <script>
        // --- BƯỚC 1: ÔNG CHỈ CẦN LIỆT KÊ TÊN ẢNH VÀO ĐÂY ---
        // Ví dụ: ảnh của ông là 1.jpg, 2.png, nhi.jpg... thì cứ ghi vào list này
        const danhSachAnh = [
            'anh1.jpg',
            'anh2.jpg',
            'anh3.jpg',
            'anh4.jpg',
            'anh5.png',
            'anh6.jpeg'
            // Thêm bao nhiêu cũng được, chỉ cần ngăn cách bởi dấu phẩy
        ];

        // --- BƯỚC 2: MÁY TỰ CHẠY (ĐỪNG SỬA) ---
        const gallery = document.getElementById('image-gallery');
        const folderPath = '../Images/'; // Đường dẫn tới thư mục ảnh

        danhSachAnh.forEach(tenAnh => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.innerHTML = `<img src="${folderPath}${tenAnh}" alt="Kỷ niệm" loading="lazy">`;
            gallery.appendChild(item);
        });
    </script>

</body>
</html>
