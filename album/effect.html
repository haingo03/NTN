<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang mở khóa... ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            /* Nền gradient chuyển màu liên tục */
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #ffdde1, #fad0c4);
            background-size: 400% 400%;
            animation: gradientBG 5s ease infinite;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Trái tim lớn ở giữa */
        .center-heart {
            font-size: 120px;
            animation: heartbeat 1s infinite alternate;
            filter: drop-shadow(0 0 25px rgba(255, 71, 87, 0.8));
            z-index: 10;
        }

        @keyframes heartbeat {
            from { transform: scale(1); }
            to { transform: scale(1.3) rotate(5deg); }
        }

        /* Dòng chữ cute */
        .text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #d63031;
            margin-top: 20px;
            z-index: 10;
            text-shadow: 2px 2px 5px rgba(255,255,255,0.9);
            animation: fadeInOut 2s infinite alternate;
        }

        @keyframes fadeInOut {
            from { opacity: 0.8; }
            to { opacity: 1; transform: translateY(-5px); }
        }

        /* Trái tim nhỏ bay lơ lửng */
        .floating-heart {
            position: absolute;
            bottom: -50px;
            animation: floatUp linear forwards;
            opacity: 0.8;
            z-index: 5;
        }

        @keyframes floatUp {
            to { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="center-heart">💖</div>
    <div class="text">Đang gom nhặt yêu thương...</div>

    <script>
        // Hàm tạo trái tim nhỏ bay lên
        function createHearts() {
            const colors = ['❤️', '💖', '💘', '💝', '✨', '🌹'];
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerText = colors[Math.floor(Math.random() * colors.length)];
            
            // Vị trí xuất hiện ngẫu nhiên theo chiều ngang
            heart.style.left = Math.random() * 100 + 'vw';
            
            // Tốc độ bay ngẫu nhiên từ 2s đến 4.5s
            heart.style.animationDuration = (Math.random() * 2.5 + 2) + 's'; 
            
            // Kích thước ngẫu nhiên
            heart.style.fontSize = (Math.random() * 25 + 15) + 'px';
            
            document.body.appendChild(heart);
            
            // Xóa phần tử sau khi bay xong để nhẹ máy
            setTimeout(() => { heart.remove(); }, 5000);
        }

        // Tạo trái tim liên tục mỗi 100ms
        setInterval(createHearts, 100);

        // --- QUAN TRỌNG: TỰ ĐỘNG CHUYỂN TRANG ---
        // Sau 4000ms (4 giây), tự động nhảy sang trang album
        setTimeout(() => {
            // Chú ý: Cậu hãy sửa lại đường dẫn này cho đúng với vị trí file album của cậu nhé.
            // Nếu file album.html nằm cùng thư mục với file effect.html này, thì chỉ cần để "album.html"
            window.location.href = "album.html"; 
        }, 4000); 
    </script>
</body>
</html>
